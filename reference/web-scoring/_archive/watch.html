<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
<title>Watch Live — All-Stars Live</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Saira+Condensed:wght@500;600;700;800&family=Barlow:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0b1220; --bg2:#0f172a; --card:#16223c; --card2:#1c2b49; --line:#27375c;
    --chalk:#F8FAFC; --slate:#94A3B8; --slate-dim:#64748B;
    --gold:#FBBF24; --gold-deep:#F59E0B; --live:#22C55E;
    --disp:"Saira Condensed",system-ui,-apple-system,sans-serif;
    --body:"Barlow",system-ui,-apple-system,sans-serif;
    --ease:cubic-bezier(.16,1,.3,1);
  }
  *{box-sizing:border-box;margin:0;-webkit-tap-highlight-color:transparent;}
  html,body{min-height:100dvh;}
  body{font-family:var(--body);color:var(--chalk);min-height:100dvh;display:flex;flex-direction:column;
    align-items:center;justify-content:center;padding:28px 18px calc(28px + env(safe-area-inset-bottom));
    background:radial-gradient(130% 75% at 50% -6%, #16244a 0%, var(--bg2) 46%, var(--bg) 100%);
    background-attachment:fixed;text-align:center;}
  .wrap{width:100%;max-width:420px;display:flex;flex-direction:column;align-items:center;gap:20px;}

  .brand{display:flex;align-items:center;gap:9px;}
  .brand .bar{width:26px;height:4px;border-radius:2px;background:var(--gold);box-shadow:0 0 12px rgba(251,191,36,.55);}
  .brand .txt{font-family:var(--disp);font-weight:800;font-size:16px;letter-spacing:2.5px;color:var(--chalk);}
  .brand .txt span{color:var(--gold);}

  .live{display:inline-flex;align-items:center;gap:8px;background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.4);
    border-radius:999px;padding:7px 15px;}
  .live .dot{width:9px;height:9px;border-radius:50%;background:var(--live);box-shadow:0 0 12px var(--live);
    animation:pulse 1.5s ease-in-out infinite;}
  .live .lbl{font-family:var(--disp);font-weight:700;font-size:13px;letter-spacing:.18em;color:var(--live);}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}

  .matchup{width:100%;background:linear-gradient(180deg,var(--card),#101a30);border:1px solid var(--line);
    border-radius:20px;padding:24px 20px;box-shadow:0 16px 44px -16px rgba(0,0,0,.7), inset 0 1px 0 rgba(255,255,255,.04);
    display:flex;flex-direction:column;gap:14px;}
  .team{display:flex;align-items:center;gap:14px;}
  .team .abbr{font-family:var(--disp);font-weight:800;font-size:26px;letter-spacing:.5px;color:#0b1220;
    background:var(--gold);border-radius:11px;min-width:62px;padding:8px 6px;line-height:1;}
  .team .abbr.away{background:var(--slate);}
  .team .name{font-family:var(--disp);font-weight:700;font-size:24px;letter-spacing:.3px;text-align:left;line-height:1.05;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .vs{display:flex;align-items:center;gap:12px;color:var(--slate-dim);}
  .vs::before,.vs::after{content:"";flex:1;height:1px;background:var(--line);}
  .vs span{font-family:var(--disp);font-weight:700;font-size:13px;letter-spacing:.2em;color:var(--slate);}

  .watch{width:100%;display:flex;align-items:center;justify-content:center;gap:10px;
    background:linear-gradient(180deg,#FCCB3D,#F59E0B);border:none;color:#241803;border-radius:15px;padding:19px;
    font-family:var(--disp);font-size:22px;font-weight:800;letter-spacing:1px;text-transform:uppercase;cursor:pointer;
    box-shadow:0 8px 24px rgba(245,158,11,.36);transition:transform .1s;}
  .watch:active{transform:scale(.98);}
  .watch svg{width:22px;height:22px;}

  .note{font-size:12.5px;color:var(--slate-dim);line-height:1.6;}
  .note b{color:var(--slate);}
</style>
</head>
<body>
<div class="wrap">
  <div class="brand"><div class="bar"></div><div class="txt">ALL-STARS <span>LIVE</span></div></div>
  <div class="live"><span class="dot"></span><span class="lbl">LIVE</span></div>

  <div class="matchup">
    <div class="team"><div class="abbr away" id="awayAbbr">VIS</div><div class="name" id="awayName">Visitors</div></div>
    <div class="vs"><span>VS</span></div>
    <div class="team"><div class="abbr" id="homeAbbr">HOME</div><div class="name" id="homeName">Home</div></div>
  </div>

  <button class="watch" id="watchBtn">
    <svg viewBox="0 0 24 24" fill="#241803" stroke="none"><path d="M8 5v14l11-7z"/></svg>
    Watch Now
  </button>

  <div class="note">Free — <b>no app needed</b>. Live scoring straight from the scorekeeper at the field.</div>
</div>

<script>
"use strict";
const q=new URLSearchParams(location.search);
const ws=q.get("ws")||q.get("server")||"";
const homeName=(q.get("homeName")||q.get("home")||"Home").trim();
const awayName=(q.get("awayName")||q.get("away")||"Away").trim();
const homeAbbr=(q.get("home")||homeName).slice(0,3).toUpperCase();
const awayAbbr=(q.get("away")||awayName).slice(0,3).toUpperCase();

document.getElementById("homeName").textContent=homeName;
document.getElementById("awayName").textContent=awayName;
document.getElementById("homeAbbr").textContent=homeAbbr;
document.getElementById("awayAbbr").textContent=awayAbbr;
document.title = `${awayAbbr} vs ${homeAbbr} — Watch Live`;

// Open the live viewer (same tab), carrying the relay URL through.
function watch(){
  const u=new URL("viewer.html", location.href);
  if(ws) u.searchParams.set("ws", ws);
  location.href=u.href;
}
document.getElementById("watchBtn").addEventListener("click",watch);
</script>
</body>
</html>
