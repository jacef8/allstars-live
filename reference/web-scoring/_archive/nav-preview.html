<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>All-Stars Scorer</title>
<style>
  :root{
    --night:#090D15; --night2:#06090F;
    --surface:#141C28; --surface2:#1C2634; --surface3:#222D3D;
    --line:#2A3442; --line-soft:#1E2733;
    --chalk:#F4F6F9; --muted:#8C97A8; --muted-dim:#586475;
    --amber:#F4B233; --amber-deep:#E29B1D;
    --blue:#3B82F6; --blue-soft:#5B97FF;
    --red:#E2574C; --green-ok:#41C463; --live:#FF453A;
    --sans:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;background:#03050a;font-family:var(--sans);color:var(--chalk);}
  #app{max-width:440px;height:100dvh;margin:0 auto;display:flex;flex-direction:column;position:relative;overflow:hidden;
    background:radial-gradient(120% 80% at 50% -10%,#10182a 0%,var(--night) 46%,var(--night2) 100%);}
  .scroll{flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;
    padding:13px 13px 12px;display:flex;flex-direction:column;gap:12px;}
  .num{font-variant-numeric:tabular-nums;letter-spacing:-.01em;}
  ::-webkit-scrollbar{width:0;}

  /* ============ SCOREBUG ============ */
  .bug{display:flex;align-items:stretch;border-radius:14px;overflow:hidden;flex-shrink:0;
    background:linear-gradient(180deg,#1d283a 0%,#0f1622 100%);
    border:1px solid var(--line);box-shadow:0 6px 22px rgba(0,0,0,.55),inset 0 1px 0 rgba(255,255,255,.05);}
  .bug .teams{display:flex;flex-direction:column;justify-content:center;gap:5px;padding:10px 14px;min-width:128px;
    border-right:1px solid var(--line);}
  .trow{display:flex;align-items:center;height:24px;}
  .trow .bar{width:4px;height:20px;border-radius:2px;}
  .trow .ab{font-weight:800;font-size:15px;letter-spacing:.5px;margin-left:10px;min-width:38px;}
  .trow .rn{margin-left:auto;font-weight:800;font-size:21px;}
  .trow.dim .ab,.trow.dim .rn{color:var(--muted);}
  .trow.dim .bar{opacity:.35;}
  .bug .mid{display:flex;align-items:center;gap:15px;padding:0 16px;flex:1;justify-content:center;}
  .mcol{text-align:center;}
  .mcol .lab{font-size:9px;font-weight:800;letter-spacing:1px;color:var(--muted-dim);margin-bottom:3px;}
  .mcol .big{font-size:21px;font-weight:800;line-height:1;}
  .pips{display:flex;flex-direction:column;gap:4px;}
  .pips span{width:9px;height:9px;border-radius:50%;border:1.5px solid var(--muted-dim);}
  .pips span.on{background:var(--red);border-color:var(--red);}
  .live{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;padding:0 13px;
    background:linear-gradient(180deg,rgba(255,69,58,.14),rgba(255,69,58,.05));border-left:1px solid var(--line);}
  .live .d{width:8px;height:8px;border-radius:50%;background:var(--live);box-shadow:0 0 8px var(--live);animation:pulse 1.6s infinite;}
  .live .t{font-size:9px;font-weight:900;letter-spacing:1.5px;color:#ff6b62;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}

  /* ============ BATTER CARD ============ */
  .batter{display:flex;align-items:center;gap:14px;border-radius:14px;padding:11px 15px;flex-shrink:0;
    background:linear-gradient(95deg,rgba(59,130,246,.16),rgba(20,28,40,.6) 60%);
    border:1px solid var(--line);border-left:3px solid var(--blue);
    box-shadow:0 4px 16px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.04);}
  .batter .no{font-size:36px;font-weight:900;color:var(--blue-soft);min-width:50px;text-align:center;line-height:1;
    text-shadow:0 2px 12px rgba(59,130,246,.4);}
  .batter .nm{font-size:23px;font-weight:800;letter-spacing:.4px;text-transform:uppercase;line-height:1;}
  .batter .meta{font-size:11px;color:var(--muted);margin-top:4px;letter-spacing:.2px;}
  .batter .tag{margin-left:auto;text-align:right;font-size:10px;font-weight:900;letter-spacing:1.8px;
    color:var(--blue-soft);line-height:1.3;opacity:.85;}

  /* ============ FIELD (the hero) ============ */
  .fieldwrap{flex:1;min-height:200px;display:flex;flex-direction:column;align-items:center;justify-content:center;
    border-radius:16px;position:relative;overflow:hidden;
    background:radial-gradient(80% 70% at 50% 12%,#11233a 0%,#0a1320 55%,#070d16 100%);
    border:1px solid var(--line-soft);box-shadow:inset 0 1px 0 rgba(255,255,255,.03),0 4px 18px rgba(0,0,0,.45);}
  .fieldwrap svg{width:100%;height:100%;max-height:300px;display:block;}
  .fieldhint{position:absolute;bottom:11px;left:0;right:0;text-align:center;font-size:11px;font-weight:600;
    letter-spacing:.3px;color:var(--muted-dim);pointer-events:none;}

  /* ============ CONTROLS (tap targets) ============ */
  .controls{flex-shrink:0;display:flex;flex-direction:column;gap:9px;}
  .a-pitch{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px;}
  .a-pitch button{position:relative;border:1px solid var(--line);border-top-color:rgba(255,255,255,.09);
    background:linear-gradient(180deg,#243044,#161e2b);color:var(--chalk);border-radius:13px;padding:17px 8px;
    font-family:var(--sans);font-size:16px;font-weight:800;letter-spacing:.3px;cursor:pointer;
    box-shadow:0 2px 8px rgba(0,0,0,.35),inset 0 1px 0 rgba(255,255,255,.05);transition:transform .08s,filter .1s;}
  .a-pitch button:active{transform:scale(.95);filter:brightness(1.15);}
  .a-pitch button small{display:block;font-size:10px;font-weight:600;color:var(--muted);letter-spacing:1px;margin-top:3px;}
  .a-inplay{display:flex;align-items:center;justify-content:center;gap:10px;
    background:linear-gradient(180deg,#f8c451,#e8a01b);
    border:none;color:#241803;border-radius:14px;padding:18px;font-family:var(--sans);font-size:17px;font-weight:900;
    letter-spacing:1px;cursor:pointer;box-shadow:0 5px 18px rgba(244,178,51,.34),inset 0 1px 0 rgba(255,255,255,.4);
    transition:transform .08s;}
  .a-inplay:active{transform:scale(.98);}
  .a-inplay svg{width:18px;height:18px;}
  .a-sec{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
  .a-sec button{background:var(--surface);border:1px solid var(--line);color:var(--chalk);border-radius:12px;
    padding:13px;font-family:var(--sans);font-size:14px;font-weight:800;cursor:pointer;letter-spacing:.3px;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.03);transition:transform .08s;}
  .a-sec button:active{transform:scale(.97);}
  .a-sec button small{color:var(--muted);font-weight:600;font-size:11px;margin-left:5px;}

  /* ============ LINEUP ============ */
  .sec-head{display:flex;align-items:baseline;justify-content:space-between;padding:2px 2px 0;flex-shrink:0;}
  .sec-head h2{font-size:18px;font-weight:800;letter-spacing:.2px;}
  .sec-head .sub{font-size:11px;font-weight:700;letter-spacing:.5px;color:var(--muted-dim);text-transform:uppercase;}
  .lu-row{display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--line);
    border-radius:12px;padding:12px 14px;box-shadow:inset 0 1px 0 rgba(255,255,255,.03);}
  .lu-row .s{font-size:12px;font-weight:800;color:var(--muted-dim);width:14px;text-align:center;}
  .lu-row .n{font-weight:800;color:var(--blue-soft);min-width:34px;}
  .lu-row .nm{flex:1;font-weight:700;letter-spacing:.2px;}
  .lu-row .p{font-size:12px;font-weight:800;color:var(--chalk);background:var(--surface3);border:1px solid var(--line);
    border-radius:7px;padding:5px 10px;letter-spacing:.5px;}

  /* ============ STATS empty ============ */
  .empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;
    color:var(--muted-dim);text-align:center;padding:48px 28px;}
  .empty .ico{width:54px;height:54px;border-radius:15px;background:var(--surface);border:1px solid var(--line);
    display:flex;align-items:center;justify-content:center;}
  .empty .ico svg{width:26px;height:26px;stroke:var(--muted);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
  .empty .big{font-size:17px;font-weight:800;color:var(--muted);}
  .empty p{font-size:13px;line-height:1.5;max-width:240px;}

  /* ============ BOTTOM TAB BAR ============ */
  .tabbar{display:flex;flex-shrink:0;background:linear-gradient(180deg,rgba(9,13,21,.85),rgba(6,9,15,.98));
    border-top:1px solid #1a2230;padding-bottom:env(safe-area-inset-bottom);backdrop-filter:blur(12px);}
  .tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;padding:10px 0 11px;
    background:none;border:none;cursor:pointer;color:var(--muted-dim);position:relative;transition:color .18s;}
  .tab svg{width:24px;height:24px;stroke:currentColor;fill:none;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round;}
  .tab .lbl{font-size:11px;font-weight:700;letter-spacing:.2px;}
  .tab.on{color:var(--chalk);}
  .tab.on svg{stroke:var(--amber);}
  .tab.on::before{content:"";position:absolute;top:0;left:50%;transform:translateX(-50%);
    width:32px;height:3px;border-radius:0 0 3px 3px;background:var(--amber);box-shadow:0 0 10px rgba(244,178,51,.6);}
</style>
</head>
<body>
<div id="app">
  <div class="scroll" id="content"></div>
  <nav class="tabbar">
    <button class="tab" data-tab="score">
      <svg viewBox="0 0 24 24"><path d="M12 3.5 19 10v9a1 1 0 0 1-1 1h-3.5v-5h-5v5H6a1 1 0 0 1-1-1v-9z"/></svg>
      <span class="lbl">Score</span></button>
    <button class="tab" data-tab="lineup">
      <svg viewBox="0 0 24 24"><path d="M9 6h11M9 12h11M9 18h11"/><circle cx="4.5" cy="6" r="1.3"/><circle cx="4.5" cy="12" r="1.3"/><circle cx="4.5" cy="18" r="1.3"/></svg>
      <span class="lbl">Lineup</span></button>
    <button class="tab" data-tab="stats">
      <svg viewBox="0 0 24 24"><path d="M5 20V11M12 20V4M19 20v-6"/></svg>
      <span class="lbl">Stats</span></button>
  </nav>
</div>

<script>
let tab="score";

const scorebug = `
  <div class="bug">
    <div class="teams">
      <div class="trow"><span class="bar" style="background:var(--blue)"></span><span class="ab">LCA</span><span class="rn num">3</span></div>
      <div class="trow dim"><span class="bar" style="background:var(--red)"></span><span class="ab">OPP</span><span class="rn num">1</span></div>
    </div>
    <div class="mid">
      <div class="mcol"><div class="lab">BOT 4TH</div><div class="big">&#9650;</div></div>
      <div class="mcol"><div class="lab">COUNT</div><div class="big num">1&#8211;2</div></div>
      <div class="mcol"><div class="lab">OUTS</div><div class="big num">2</div></div>
      <div class="pips"><span class="on"></span><span></span><span></span></div>
    </div>
    <div class="live"><span class="d"></span><span class="t">LIVE</span></div>
  </div>`;

const batter = `
  <div class="batter">
    <span class="no num">8</span>
    <div style="flex:1;min-width:0">
      <div class="nm">Ford</div>
      <div class="meta">LCA &middot; Center Field &middot; 3rd in order</div>
    </div>
    <div class="tag">NOW<br>BATTING</div>
  </div>`;

const field = `
  <div class="fieldwrap">
    <svg viewBox="0 0 340 300" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <clipPath id="fair">
          <path d="M170 268 L25 123 A205 205 0 0 1 315 123 Z"/>
        </clipPath>
        <linearGradient id="grass" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#2f8a4d"/><stop offset="1" stop-color="#1f5e36"/>
        </linearGradient>
        <radialGradient id="lights" cx="50%" cy="6%" r="70%">
          <stop offset="0" stop-color="#ffffff" stop-opacity=".10"/><stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
        </radialGradient>
      </defs>

      <!-- outfield grass + mowing stripes -->
      <path d="M170 268 L25 123 A205 205 0 0 1 315 123 Z" fill="url(#grass)"/>
      <g clip-path="url(#fair)" opacity=".5">
        <rect x="25"  y="55" width="42" height="220" fill="#369657"/>
        <rect x="109" y="55" width="42" height="220" fill="#369657"/>
        <rect x="193" y="55" width="42" height="220" fill="#369657"/>
        <rect x="277" y="55" width="42" height="220" fill="#369657"/>
      </g>
      <path d="M170 268 L25 123 A205 205 0 0 1 315 123 Z" fill="url(#lights)"/>

      <!-- infield dirt skin -->
      <path d="M170 268 L83 181 A123 123 0 0 1 257 181 Z" fill="#b06b35"/>
      <path d="M170 268 L83 181 A123 123 0 0 1 257 181 Z" fill="#000" opacity=".06"/>

      <!-- infield grass inside the diamond -->
      <polygon points="170,256 229,203 170,150 111,203" fill="#317f49"/>

      <!-- foul lines -->
      <line x1="170" y1="268" x2="25"  y2="123" stroke="#efe2bd" stroke-width="2.4" opacity=".85"/>
      <line x1="170" y1="268" x2="315" y2="123" stroke="#efe2bd" stroke-width="2.4" opacity=".85"/>

      <!-- basepaths -->
      <polygon points="170,268 235,203 170,138 105,203" fill="none" stroke="#efe2bd" stroke-width="2" opacity=".55"/>

      <!-- pitcher's mound -->
      <circle cx="170" cy="203" r="16" fill="#b87a44"/>
      <rect x="166" y="200" width="8" height="5" rx="1" fill="#f1f3f6"/>

      <!-- bases -->
      <polygon points="235,196 242,203 235,210 228,203" fill="#f4f6f9"/>
      <polygon points="170,131 177,138 170,145 163,138" fill="#f4f6f9"/>
      <polygon points="105,196 112,203 105,210 98,203" fill="#f4f6f9"/>
      <!-- home plate -->
      <polygon points="161,259 179,259 179,266 170,273 161,266" fill="#f4f6f9"/>
    </svg>
    <div class="fieldhint">Tap where the ball went</div>
  </div>`;

const controls = `
  <div class="controls">
    <div class="a-pitch">
      <button>Ball</button>
      <button>Strike</button>
      <button>Foul</button>
    </div>
    <button class="a-inplay">
      <svg viewBox="0 0 24 24" fill="none" stroke="#241803" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="m5 12 5 5L20 7"/></svg>
      BALL IN PLAY
    </button>
    <div class="a-sec">
      <button>Walk<small>BB</small></button>
      <button>Hit by Pitch<small>HBP</small></button>
    </div>
  </div>`;

function scoreView(){ return scorebug + batter + field + controls; }

function lineupView(){
  const rows=[["1","8","Ford","CF"],["2","00","Hill","C"],["3","1","Kirkpatrick","2B"],
    ["4","2","Brock","1B"],["5","3","Stoutamire","SS"],["6","7","Reece","3B"],
    ["7","9","Grant","LF"],["8","10","Byler","RF"],["9","11","Wahlquist","P"]];
  return `<div class="sec-head"><h2>Lineup</h2><span class="sub">Liberty County All-Stars</span></div>` +
    rows.map(r=>`<div class="lu-row"><span class="s">${r[0]}</span><span class="n num">#${r[1]}</span><span class="nm">${r[2]}</span><span class="p">${r[3]}</span></div>`).join("");
}

function statsView(){
  return `<div class="empty">
    <div class="ico"><svg viewBox="0 0 24 24"><path d="M5 20V11M12 20V4M19 20v-6"/></svg></div>
    <div class="big">No stats yet</div>
    <p>Score a game and batting, pitching, and fielding numbers build here automatically.</p>
  </div>`;
}

function render(){
  document.getElementById("content").innerHTML =
    tab==="score"?scoreView() : tab==="lineup"?lineupView() : statsView();
  document.querySelectorAll(".tab").forEach(t=>t.classList.toggle("on", t.dataset.tab===tab));
}
document.addEventListener("click",e=>{
  const t=e.target.closest("[data-tab]"); if(t){tab=t.dataset.tab; render();}
});
render();
</script>
</body>
</html>
