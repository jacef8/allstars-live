<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>New Game — All-Stars Live</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Saira+Condensed:wght@500;600;700;800&family=Barlow:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --field:#10141A; --ink:#EAEDF2; --surface:#1B212B; --surface2:#262E3A; --line:#333C49;
    --sage:#9BA6B4; --sageDim:#677281; --amber:#E0A33A; --out:#F0513A; --safe:#3FB950;
    --navy:#1D3A66; --lime:#A3E635;
    --mono:"Saira Condensed",system-ui,-apple-system,sans-serif;
    --sans:"Barlow",system-ui,-apple-system,sans-serif;
    --ease:cubic-bezier(.16,1,.3,1);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;}
  html,body{background:#0B0E13;font-family:var(--sans);color:var(--ink);}
  body{min-height:100dvh;display:flex;justify-content:center;
    background:
      radial-gradient(42% 38% at 8% 2%, rgba(29,58,102,.55), transparent 70%),
      radial-gradient(60% 55% at 92% 104%, rgba(163,230,53,.10), transparent 70%),
      linear-gradient(180deg,#12161D 0%,#0B0E13 100%);
    background-attachment:fixed;padding:18px 14px 30px;}
  .wrap{width:100%;max-width:440px;display:flex;flex-direction:column;gap:14px;}

  .brand{display:flex;align-items:center;gap:11px;}
  .brand .logo{font-family:var(--mono);font-weight:800;font-size:26px;letter-spacing:1px;line-height:.9;}
  .brand .logo span{color:var(--lime);}
  .brand .bar{width:34px;height:4px;border-radius:2px;background:var(--lime);box-shadow:0 0 12px rgba(163,230,53,.55);}
  h1{font-family:var(--mono);font-weight:700;font-size:30px;letter-spacing:.5px;margin-top:2px;}
  .sub{color:var(--sage);font-size:13px;margin-top:-4px;}

  .card{background:linear-gradient(180deg,var(--surface),#161B23);border:1px solid var(--line);border-radius:14px;
    padding:14px;display:flex;flex-direction:column;gap:11px;box-shadow:0 6px 20px rgba(0,0,0,.35);}
  .lbl{font-family:var(--mono);font-weight:700;font-size:12px;letter-spacing:1.4px;color:var(--sageDim);text-transform:uppercase;}

  .teamrow{display:flex;gap:10px;}
  .teamrow .nm{flex:1;}
  .teamrow .ab{width:84px;}
  .field label{display:block;font-size:11px;color:var(--sage);font-weight:600;margin:0 0 4px 2px;letter-spacing:.3px;}
  input{width:100%;background:var(--field);border:1px solid var(--line);color:var(--ink);border-radius:10px;
    padding:11px 12px;font-family:var(--sans);font-size:15px;font-weight:600;transition:border-color .15s,box-shadow .15s;}
  input::placeholder{color:var(--sageDim);font-weight:500;}
  input:focus{outline:none;border-color:var(--lime);box-shadow:0 0 0 3px rgba(163,230,53,.16);}
  input.ab{text-transform:uppercase;text-align:center;letter-spacing:1px;font-family:var(--mono);font-weight:700;}

  .seg{display:flex;gap:6px;flex-wrap:wrap;}
  .seg button{flex:1;min-width:44px;background:var(--field);border:1px solid var(--line);color:var(--ink);
    border-radius:10px;padding:11px 6px;font-family:var(--sans);font-size:14px;font-weight:700;cursor:pointer;
    transition:all .14s var(--ease);}
  .seg button.on{background:var(--lime);border-color:var(--lime);color:#0B0E13;box-shadow:0 3px 12px rgba(163,230,53,.3);}
  .seg button:active{transform:scale(.95);}
  .seg.two button{padding:13px 6px;}

  .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .hint{font-size:11px;color:var(--sageDim);margin-top:-2px;}

  .start{margin-top:2px;background:linear-gradient(180deg,#B6F24A,#8BC91F);border:none;color:#0B0E13;
    border-radius:13px;padding:17px;font-family:var(--mono);font-size:20px;font-weight:800;letter-spacing:1px;
    text-transform:uppercase;cursor:pointer;box-shadow:0 6px 20px rgba(163,230,53,.32);transition:transform .1s;}
  .start:active{transform:scale(.98);}
  .foot{text-align:center;font-size:12px;color:var(--sageDim);}
  .foot a{color:var(--sage);}
</style>
</head>
<body>
<div class="wrap">
  <div class="brand"><div class="bar"></div><div class="logo">ALL-STARS<br><span>LIVE</span></div></div>
  <div><h1>New Game</h1><div class="sub">Set it up once — the scoreboard, viewer, and overlay all follow.</div></div>

  <div class="card">
    <div class="lbl">Teams</div>
    <div class="field"><label>Home team</label>
      <div class="teamrow">
        <input id="homeName" class="nm" placeholder="Home team name" autocomplete="off">
        <input id="homeAbbr" class="ab" maxlength="3" placeholder="ABV" autocomplete="off">
      </div></div>
    <div class="field"><label>Away team</label>
      <div class="teamrow">
        <input id="awayName" class="nm" placeholder="Away team name" autocomplete="off">
        <input id="awayAbbr" class="ab" maxlength="3" placeholder="ABV" autocomplete="off">
      </div></div>
    <div class="field"><label>Which one is ours?</label>
      <div class="seg two" id="seg-our">
        <button data-v="home">Home</button>
        <button data-v="away">Away</button>
      </div></div>
  </div>

  <div class="card">
    <div class="lbl">Rules</div>
    <div class="row2">
      <div class="field"><label>Innings</label>
        <div class="seg two" id="seg-innings">
          <button data-v="6">6</button><button data-v="7">7</button>
        </div></div>
      <div class="field"><label>Batting order</label>
        <div class="seg" id="seg-batters">
          <button data-v="9">9</button><button data-v="10">10</button>
          <button data-v="11">11</button><button data-v="12">12</button>
        </div></div>
    </div>
    <div class="field"><label>Run cap per inning</label>
      <div class="seg" id="seg-runcap">
        <button data-v="0">Off</button><button data-v="3">3</button>
        <button data-v="4">4</button><button data-v="5">5</button><button data-v="6">6</button>
      </div>
      <div class="hint">Most all-star tournaments cap runs per inning. 5 is typical.</div>
    </div>
  </div>

  <div class="card">
    <div class="lbl">Live relay</div>
    <div class="field"><label>Relay server URL (for the fan viewer)</label>
      <input id="server" placeholder="wss://your-app.up.railway.app" autocomplete="off" spellcheck="false">
      <div class="hint">Leave blank to score locally (same device only). Fans need this set.</div>
    </div>
  </div>

  <button class="start" id="startBtn">Start Game →</button>
  <div class="foot">Already mid-game? <a href="scoring-controller.html">Open the scoreboard</a></div>
</div>

<script>
"use strict";
const $=id=>document.getElementById(id);
const state={our:"home",innings:6,runcap:5,batters:9};

// segmented control wiring
function wireSeg(id,key,cast){
  const seg=$(id);
  seg.addEventListener("click",e=>{
    const b=e.target.closest("button[data-v]"); if(!b)return;
    state[key]=cast(b.dataset.v);
    [...seg.children].forEach(c=>c.classList.toggle("on",c===b));
  });
}
function paintSeg(id,val){
  [...$(id).children].forEach(c=>c.classList.toggle("on", c.dataset.v===String(val)));
}
wireSeg("seg-our","our",String);
wireSeg("seg-innings","innings",v=>parseInt(v,10));
wireSeg("seg-runcap","runcap",v=>parseInt(v,10));
wireSeg("seg-batters","batters",v=>parseInt(v,10));

// auto-suggest an abbreviation from the name (until the user types one)
function autoAbbr(nameId,abbrId){
  $(nameId).addEventListener("input",()=>{
    const ab=$(abbrId); if(ab.dataset.touched) return;
    ab.value=($(nameId).value||"").replace(/[^a-zA-Z]/g,"").slice(0,3).toUpperCase();
  });
  $(abbrId).addEventListener("input",()=>{ $(abbrId).dataset.touched="1"; });
}
autoAbbr("homeName","homeAbbr");
autoAbbr("awayName","awayAbbr");

// prefill from the last setup
(function prefill(){
  let cfg={}; try{ cfg=JSON.parse(localStorage.getItem("allstars-setup")||"{}"); }catch(e){}
  if(cfg.homeName)$("homeName").value=cfg.homeName;
  if(cfg.home){$("homeAbbr").value=cfg.home;$("homeAbbr").dataset.touched="1";}
  if(cfg.awayName)$("awayName").value=cfg.awayName;
  if(cfg.away){$("awayAbbr").value=cfg.away;$("awayAbbr").dataset.touched="1";}
  if(cfg.server)$("server").value=cfg.server;
  state.our=cfg.our==="away"?"away":"home";
  state.innings=[6,7].includes(cfg.innings)?cfg.innings:6;
  state.runcap=[0,3,4,5,6].includes(cfg.runcap)?cfg.runcap:5;
  state.batters=(cfg.batters>=9&&cfg.batters<=12)?cfg.batters:9;
  paintSeg("seg-our",state.our); paintSeg("seg-innings",state.innings);
  paintSeg("seg-runcap",state.runcap); paintSeg("seg-batters",state.batters);
})();

function start(){
  const homeName=($("homeName").value||"").trim()||"Home";
  const awayName=($("awayName").value||"").trim()||"Away";
  const home=(($("homeAbbr").value||"").trim()||homeName).replace(/[^a-zA-Z0-9]/g,"").slice(0,3).toUpperCase()||"HOM";
  const away=(($("awayAbbr").value||"").trim()||awayName).replace(/[^a-zA-Z0-9]/g,"").slice(0,3).toUpperCase()||"AWY";
  const server=($("server").value||"").trim();
  const cfg={homeName,home,awayName,away,our:state.our,innings:state.innings,runcap:state.runcap,batters:state.batters,server};
  try{ localStorage.setItem("allstars-setup",JSON.stringify(cfg)); }catch(e){}

  const q=new URLSearchParams({
    home, homeName, away, awayName, our:state.our,
    innings:String(state.innings), runcap:String(state.runcap), batters:String(state.batters),
  });
  if(server) q.set("server", server);
  location.href="scoring-controller.html?"+q.toString();
}
$("startBtn").addEventListener("click",start);
</script>
</body>
</html>
