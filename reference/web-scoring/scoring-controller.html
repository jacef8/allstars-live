<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>All-Stars Live</title>
<meta name="description" content="Live youth baseball — scorebug, play-by-play, and the game stream." />
<link rel="manifest" href="manifest.webmanifest" />
<meta name="theme-color" content="#0B0E13" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="All-Stars" />
<meta name="application-name" content="All-Stars" />
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />
<link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png" />
<link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16.png" />

<link href="https://fonts.googleapis.com/css2?family=Saira+Condensed:wght@500;600;700;800&family=Barlow:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --field:#10141A; --ink:#F2F5FA; --surface:#212A38; --surface2:#324056; --line:#6A7EA6;
    --clay:#E0974F; --chalk:#F2F5FA; --grass:#1F5C3A; --grassLt:#2C7D4E;
    --safe:#4ED070; --out:#FF6B52; --sage:#CFDAEC; --sageDim:#AEBBD4; --amber:#F0B43E;
    --live:#FF3B5C; --navy:#1D3A66; --lime:#A3E635;
    --mono:"Saira Condensed",system-ui,-apple-system,sans-serif;
    --sans:"Barlow",system-ui,-apple-system,sans-serif;
    --ease:cubic-bezier(.16,1,.3,1); --ease-soft:cubic-bezier(.4,0,.2,1);
  }
  /* NEW: Scoreboard CSS for Viewer Mode */
  .score-bug {
    position: absolute; top: 10px; left: 10px; right: 10px;
    background: rgba(13,19,32,.9); color: white; padding: 12px;
    border-radius: 12px; font-weight: 800; font-family: var(--mono);
    z-index: 100; display: flex; justify-content: space-between; align-items: center;
    border: 1px solid var(--line);
  }
  .score-bug .team-line { display: flex; gap: 10px; font-size: 18px; }

  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;scrollbar-width:none;}
  *::-webkit-scrollbar{width:0;height:0;display:none;}
  html,body{margin:0;height:100%;font-family:var(--sans);overscroll-behavior:none;
    background:linear-gradient(rgba(7,11,19,.12),rgba(7,11,19,.34)), url("bg-turf.jpg") center center / cover no-repeat #0B0E13;}
  [style*="background:#212A38"],[style*="background:#324056"],[style*="background:#1D3A66"]{
    background-color:rgba(13,19,32,.82)!important;
    -webkit-backdrop-filter:blur(13px) saturate(1.1);backdrop-filter:blur(13px) saturate(1.1);}
  .frost-card{ -webkit-backdrop-filter:blur(13px) saturate(1.1);backdrop-filter:blur(13px) saturate(1.1); }
  button{font-family:var(--sans);cursor:pointer;
    transition:transform .12s var(--ease-soft), filter .15s ease, box-shadow .18s ease, background .15s ease;}
  button:active{transform:scale(.94);filter:brightness(1.14) drop-shadow(0 0 7px rgba(163,230,53,.32));}
  button:disabled{opacity:.4;filter:none;cursor:default;}
  #wrap{position:fixed;inset:0;display:flex;justify-content:center;
    background:
      radial-gradient(42% 38% at 8% 2%, rgba(29,58,102,.22), transparent 70%),
      radial-gradient(60% 55% at 92% 104%, rgba(163,230,53,.06), transparent 70%);
    padding:10px;overflow:hidden;}
  #app{width:100%;max-width:400px;height:100%;display:flex;flex-direction:column;gap:8px;color:var(--chalk);}
  .num{font-family:var(--mono);font-variant-numeric:tabular-nums;}
  @keyframes livepulse{0%,100%{opacity:1}50%{opacity:.35}}
  .livedot{animation:livepulse 1.4s ease-in-out infinite;}
  .sb-score{display:inline-flex;align-items:center;justify-content:flex-end;overflow:hidden;height:24px;}
  .sb-score .digit{display:inline-block;}
  .sb-score.roll .digit{animation:scoreRoll .7s var(--ease) both;}
  @keyframes scoreRoll{0%{transform:translateY(78%);opacity:0;}55%{opacity:1;}100%{transform:translateY(0);opacity:1;}}
  .bso-pip{width:13px;height:13px;border-radius:50%;border:1.75px solid var(--sageDim);background:transparent;
    transition:background .4s var(--ease),border-color .4s var(--ease),box-shadow .4s var(--ease);}
  .bso-pip.b.on{background:var(--chalk);border-color:var(--chalk);}
  .bso-pip.s.on{background:var(--amber);border-color:var(--amber);box-shadow:0 0 8px rgba(251,191,36,.55);}
  .bso-pip.o.on{background:var(--out);border-color:var(--out);box-shadow:0 0 8px rgba(255,77,79,.5);}
  .bso-pip.just{animation:pipPop .48s var(--ease);}
  @keyframes pipPop{0%{transform:scale(.35);}55%{transform:scale(1.5);}100%{transform:scale(1);}}
  .bso-row.swept .bso-pip{animation:pipSweep .5s var(--ease-soft);}
  @keyframes pipSweep{0%{opacity:.2;transform:translateX(-6px);}100%{opacity:1;transform:translateX(0);}}
  .sb-base.pop{animation:basePop .55s var(--ease);}
  @keyframes basePop{0%{filter:drop-shadow(0 0 0 rgba(244,178,51,0));}
    50%{filter:drop-shadow(0 0 7px rgba(244,178,51,.95));}100%{filter:drop-shadow(0 0 2px rgba(244,178,51,.4));}}
  .screen-in{animation:screenIn .28s var(--ease) both;}
  @keyframes screenIn{0%{opacity:0;transform:translateY(7px);}100%{opacity:1;transform:translateY(0);}}
  #splash{position:fixed;inset:0;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;
    background:radial-gradient(60% 48% at 50% 38%, rgba(29,58,102,.55), transparent 70%), linear-gradient(180deg,#12161D,#0B0E13);
    animation:splashOut .55s var(--ease-soft) 1.3s forwards;}
  #splash .sp-logo{font-family:var(--mono);font-weight:800;font-size:clamp(46px,13vw,72px);line-height:.88;letter-spacing:2px;text-align:center;color:#EAEDF2;animation:spPop .7s var(--ease) both;}
  #splash .sp-logo span{color:var(--lime);}
  #splash .sp-bar{width:56px;height:4px;border-radius:2px;background:var(--lime);box-shadow:0 0 14px rgba(163,230,53,.6);animation:spPop .7s var(--ease) .1s both;}
  #splash .sp-sub{font-size:12px;font-weight:700;letter-spacing:5px;color:var(--sage);animation:spPop .7s var(--ease) .18s both;}
  @keyframes splashOut{to{opacity:0;visibility:hidden;}}
  @keyframes spPop{0%{transform:translateY(12px);opacity:0;}60%{opacity:1;}100%{transform:translateY(0);opacity:1;}}
  @media (min-width:760px) and (orientation:landscape){ #app{max-width:1280px;} }
  @media (min-width:1500px){ #app{max-width:1480px;} .page-zoom{zoom:1.18;width:calc(100% / 1.18);} }
  @media (min-width:1920px){ #app{max-width:1680px;} .page-zoom{zoom:1.32;width:calc(100% / 1.32);} }
  #mon-col{transition:flex-basis .34s ease, max-width .34s ease, opacity .22s ease, margin-right .34s ease;}
  .mini-count{display:none;}
  #console-row.video-off .mini-count{display:flex;}
</style>
